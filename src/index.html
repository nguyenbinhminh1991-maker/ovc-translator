<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>

<body>
  <!-- ═══════════════════ OVERLAY VIEW ═══════════════════ -->
  <div id="overlay-view" class="view active">
    <div id="drag-region">
      <div class="control-bar">
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>

        <div class="status-area">
          <span id="status-indicator" class="status-dot disconnected"></span>
          <span id="status-text" class="status-text">Ready</span>
        </div>

        <div class="source-controls">
          <button id="btn-source-system" class="source-btn active" title="System Audio (Ctrl+1)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
            </svg>
          </button>
          <button id="btn-source-mic" class="source-btn" title="Microphone (Ctrl+2)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </button>
          <button id="btn-source-both" class="source-btn" title="System + Mic (Ctrl+3)">
            <svg width="16" height="14" viewBox="0 0 28 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="9 6 5 9 2 9 2 15 5 15 9 18 9 6" />
              <path d="M12.5 9.5a3 3 0 0 1 0 5" />
              <path d="M20 4a2.5 2.5 0 0 0-2.5 2.5v5a2.5 2.5 0 0 0 5 0v-5A2.5 2.5 0 0 0 20 4z" />
              <path d="M25 10v1.5a5 5 0 0 1-10 0V10" />
            </svg>
          </button>
        </div>

        <button id="btn-start" class="action-btn" title="Start/Stop (Ctrl+Enter)">
          <svg id="icon-play" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
          <svg id="icon-stop" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="4" y="4" width="16" height="16" rx="2" />
          </svg>
        </button>

        <div class="toolbar-group">
          <button id="btn-clear" class="icon-btn" title="Clear transcript">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
            </svg>
          </button>

          <button id="btn-copy" class="icon-btn" title="Copy transcript">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
          </button>

          <button id="btn-save" class="icon-btn" title="Save transcript as .txt">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span style="font-size:9px;line-height:1;margin-left:1px">TXT</span>
          </button>

          <button id="btn-save-csv" class="icon-btn" title="Save transcript as .csv">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span style="font-size:9px;line-height:1;margin-left:1px">CSV</span>
          </button>
        </div>

      </div>
    </div>

    <!-- Transcript Area -->
    <div id="transcript-container">
      <div id="transcript-content">
        <div class="transcript-placeholder">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            opacity="0.4">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
          <p>Press ▶ to start translating</p>
        </div>
      </div>
    </div>

    <!-- Floating controls (bottom) -->
    <div class="floating-controls">
      <div class="font-controls">
        <button id="btn-font-down" class="float-btn" title="Decrease font size">A−</button>
        <span id="font-size-display" class="font-size-label">16</span>
        <button id="btn-font-up" class="float-btn" title="Increase font size">A+</button>
      </div>
      <div class="color-controls">
        <button class="color-dot active" data-color="#ffffff" title="White" style="background:#ffffff;"></button>
        <button class="color-dot" data-color="#ffd700" title="Yellow" style="background:#ffd700;"></button>
        <button class="color-dot" data-color="#00e5ff" title="Cyan" style="background:#00e5ff;"></button>
      </div>
      <button id="btn-view-mode" class="float-btn" title="Toggle dual view">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="18" rx="1" />
          <rect x="14" y="3" width="7" height="18" rx="1" />
        </svg>
      </button>
    </div>

    <!-- Resize Handle -->
    <div id="resize-handle"></div>
  </div>

  <!-- ═══════════════════ SETTINGS VIEW ═══════════════════ -->
  <div id="settings-view" class="view">
    <div id="settings-drag">
      <div class="settings-header">
        <button id="btn-back" class="icon-btn" title="Back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
        </button>
        <h2>Settings</h2>
        <button id="btn-save-settings-top" class="icon-btn save-btn-top" title="Save & Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </button>
      </div>
    </div>

    <div class="settings-body">
      <!-- Tab Bar -->
      <div class="settings-tabs">
        <button class="settings-tab active" data-tab="tab-translation">Translation</button>
      </div>

      <!-- Tab: Translation -->
      <div class="settings-tab-content active" id="tab-translation">
        <div class="settings-section" id="section-languages">
          <!-- Translation Type -->
          <div style="margin-bottom: 10px;">
            <span class="field-label">Translation Type</span>
            <select id="select-translation-type">
              <option value="one_way">One-way → translate all to target</option>
              <option value="two_way">Two-way ↔ translate between two languages</option>
            </select>
          </div>

          <!-- One-way: Source + Target -->
          <div id="section-oneway-langs" class="field-row">
            <div class="field">
              <span class="field-label">Source</span>
              <select id="select-source-lang">
                <option value="auto">Auto-detect</option>
                <optgroup label="Popular">
                  <option value="en">English</option>
                  <option value="ja">Japanese</option>
                  <option value="ko">Korean</option>
                  <option value="zh">Chinese</option>
                  <option value="vi">Vietnamese</option>
                  <option value="fr">French</option>
                  <option value="de">German</option>
                  <option value="es">Spanish</option>
                  <option value="th">Thai</option>
                  <option value="id">Indonesian</option>
                </optgroup>
                <optgroup label="All Languages">
                  <option value="af">Afrikaans</option>
                  <option value="sq">Albanian</option>
                  <option value="ar">Arabic</option>
                  <option value="az">Azerbaijani</option>
                  <option value="eu">Basque</option>
                  <option value="be">Belarusian</option>
                  <option value="bn">Bengali</option>
                  <option value="bs">Bosnian</option>
                  <option value="bg">Bulgarian</option>
                  <option value="ca">Catalan</option>
                  <option value="hr">Croatian</option>
                  <option value="cs">Czech</option>
                  <option value="da">Danish</option>
                  <option value="nl">Dutch</option>
                  <option value="et">Estonian</option>
                  <option value="fi">Finnish</option>
                  <option value="gl">Galician</option>
                  <option value="el">Greek</option>
                  <option value="gu">Gujarati</option>
                  <option value="he">Hebrew</option>
                  <option value="hi">Hindi</option>
                  <option value="hu">Hungarian</option>
                  <option value="it">Italian</option>
                  <option value="kn">Kannada</option>
                  <option value="kk">Kazakh</option>
                  <option value="lv">Latvian</option>
                  <option value="lt">Lithuanian</option>
                  <option value="mk">Macedonian</option>
                  <option value="ms">Malay</option>
                  <option value="ml">Malayalam</option>
                  <option value="mr">Marathi</option>
                  <option value="no">Norwegian</option>
                  <option value="fa">Persian</option>
                  <option value="pl">Polish</option>
                  <option value="pt">Portuguese</option>
                  <option value="pa">Punjabi</option>
                  <option value="ro">Romanian</option>
                  <option value="ru">Russian</option>
                  <option value="sr">Serbian</option>
                  <option value="sk">Slovak</option>
                  <option value="sl">Slovenian</option>
                  <option value="sw">Swahili</option>
                  <option value="sv">Swedish</option>
                  <option value="tl">Tagalog</option>
                  <option value="ta">Tamil</option>
                  <option value="te">Telugu</option>
                  <option value="tr">Turkish</option>
                  <option value="uk">Ukrainian</option>
                  <option value="ur">Urdu</option>
                  <option value="cy">Welsh</option>
                </optgroup>
              </select>
            </div>
            <div class="field">
              <span class="field-label">Target</span>
              <select id="select-target-lang">
                <optgroup label="Popular">
                  <option value="vi">Vietnamese</option>
                  <option value="en">English</option>
                  <option value="ja">Japanese</option>
                  <option value="ko">Korean</option>
                  <option value="zh">Chinese</option>
                  <option value="fr">French</option>
                  <option value="de">German</option>
                  <option value="es">Spanish</option>
                  <option value="th">Thai</option>
                  <option value="id">Indonesian</option>
                </optgroup>
                <optgroup label="All Languages">
                  <option value="af">Afrikaans</option>
                  <option value="sq">Albanian</option>
                  <option value="ar">Arabic</option>
                  <option value="az">Azerbaijani</option>
                  <option value="eu">Basque</option>
                  <option value="be">Belarusian</option>
                  <option value="bn">Bengali</option>
                  <option value="bs">Bosnian</option>
                  <option value="bg">Bulgarian</option>
                  <option value="ca">Catalan</option>
                  <option value="hr">Croatian</option>
                  <option value="cs">Czech</option>
                  <option value="da">Danish</option>
                  <option value="nl">Dutch</option>
                  <option value="et">Estonian</option>
                  <option value="fi">Finnish</option>
                  <option value="gl">Galician</option>
                  <option value="el">Greek</option>
                  <option value="gu">Gujarati</option>
                  <option value="he">Hebrew</option>
                  <option value="hi">Hindi</option>
                  <option value="hu">Hungarian</option>
                  <option value="it">Italian</option>
                  <option value="kn">Kannada</option>
                  <option value="kk">Kazakh</option>
                  <option value="lv">Latvian</option>
                  <option value="lt">Lithuanian</option>
                  <option value="mk">Macedonian</option>
                  <option value="ms">Malay</option>
                  <option value="ml">Malayalam</option>
                  <option value="mr">Marathi</option>
                  <option value="no">Norwegian</option>
                  <option value="fa">Persian</option>
                  <option value="pl">Polish</option>
                  <option value="pt">Portuguese</option>
                  <option value="pa">Punjabi</option>
                  <option value="ro">Romanian</option>
                  <option value="ru">Russian</option>
                  <option value="sr">Serbian</option>
                  <option value="sk">Slovak</option>
                  <option value="sl">Slovenian</option>
                  <option value="sw">Swahili</option>
                  <option value="sv">Swedish</option>
                  <option value="tl">Tagalog</option>
                  <option value="ta">Tamil</option>
                  <option value="te">Telugu</option>
                  <option value="tr">Turkish</option>
                  <option value="uk">Ukrainian</option>
                  <option value="ur">Urdu</option>
                  <option value="cy">Welsh</option>
                </optgroup>
              </select>
            </div>
          </div>

          <!-- Two-way: Language A + Language B -->
          <div id="section-twoway-langs" class="field-row" style="display:none;">
            <div class="field">
              <span class="field-label">Language A</span>
              <select id="select-lang-a">
                <optgroup label="Popular">
                  <option value="ja">Japanese</option>
                  <option value="en">English</option>
                  <option value="ko">Korean</option>
                  <option value="zh">Chinese</option>
                  <option value="vi">Vietnamese</option>
                  <option value="fr">French</option>
                  <option value="de">German</option>
                  <option value="es">Spanish</option>
                  <option value="th">Thai</option>
                  <option value="id">Indonesian</option>
                </optgroup>
              </select>
            </div>
            <div class="field">
              <span class="field-label">Language B</span>
              <select id="select-lang-b">
                <optgroup label="Popular">
                  <option value="vi">Vietnamese</option>
                  <option value="en">English</option>
                  <option value="ja">Japanese</option>
                  <option value="ko">Korean</option>
                  <option value="zh">Chinese</option>
                  <option value="fr">French</option>
                  <option value="de">German</option>
                  <option value="es">Spanish</option>
                  <option value="th">Thai</option>
                  <option value="id">Indonesian</option>
                </optgroup>
              </select>
            </div>
          </div>
          <p class="hint" id="hint-twoway" style="display:none;">Speech in Language A → translated to B, and vice versa.</p>

          <!-- Strict Language Detection -->
          <label class="checkbox-option" id="section-strict-lang" style="margin-top: 8px;">
            <input type="checkbox" id="check-strict-lang" />
            <span class="checkbox-label">Strict language detection <span class="hint-dim">(reduce false language matches)</span></span>
          </label>

          <!-- Endpoint Delay -->
          <div class="slider-field" id="section-endpoint-delay" style="margin-top: 12px;">
            <span class="field-label" title="Time to wait after speech stops before translating">Endpoint Delay</span>
            <input type="range" id="range-endpoint-delay" min="500" max="3000" step="100" value="3000" />
            <span id="endpoint-delay-value" class="range-value">3.0s</span>
          </div>
        </div>

        <div class="settings-section">
          <span class="field-label">Audio Source</span>
          <div class="radio-group" id="audio-source-group">
            <label class="radio-option"><input type="radio" name="audio-source" value="system" checked /><span class="radio-label">System</span></label>
            <label class="radio-option"><input type="radio" name="audio-source" value="microphone" /><span class="radio-label">Mic</span></label>
            <label class="radio-option"><input type="radio" name="audio-source" value="both" /><span class="radio-label">Both</span></label>
          </div>
          <p class="hint" style="margin-top:6px;">System audio requires screen share — enable "Share system audio" in the browser prompt.</p>
        </div>

      </div>

      <!-- Save -->
      <div class="settings-actions">
        <button id="btn-save-settings" class="primary-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Save & Close
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>

</html>
